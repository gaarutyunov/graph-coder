[tool.poetry]
name = "graph-coder"
version = "0.1.0"
description = "GraphCoder: Transformer Pre-trained on Code Represented as Graph"
authors = ["German Arutyunov <germanarutyunov@gmail.com>"]
license = "mit"

[tool.poetry.dependencies]
python = "^3.9"
deepspeed = "^0.7.3"
pytorch-lightning = "^1.7.7"
lightning-transformers = "^0.2.3"
torch = "1.12.0"
torchaudio = "0.12.0"
torchvision = "0.13.0"
torchtext = "0.13.0"
torchmetrics = "0.10.0"
torch-scatter = { url = "https://data.pyg.org/whl/torch-1.12.0%2Bcpu/torch_scatter-2.0.9-cp39-cp39-macosx_10_15_x86_64.whl", markers = "sys_platform == 'darwin'" }
torch-sparse = { url = "https://data.pyg.org/whl/torch-1.12.0%2Bcpu/torch_sparse-0.6.15-cp39-cp39-macosx_10_15_x86_64.whl", markers = "sys_platform == 'darwin'" }
torch-spline-conv = { url = "https://data.pyg.org/whl/torch-1.12.0%2Bcpu/torch_spline_conv-1.2.1-cp39-cp39-macosx_10_15_x86_64.whl", markers = "sys_platform == 'darwin'" }
torch-cluster = { url = "https://data.pyg.org/whl/torch-1.12.0%2Bcpu/torch_cluster-1.6.0-cp39-cp39-macosx_10_15_x86_64.whl", markers = "sys_platform == 'darwin'" }
torch-geometric = "2.1.0"
performer-pytorch = "1.1.4"
datasets = "2.6.1"
transformers = "4.23.1"
tokenizers = "0.13.1"
networkx = "2.8.7"
numpy = "1.22.4"
scikit-learn = "1.1.3"
pybind11 = "^2.10.0"
fasttext = {git = "https://github.com/cfculhane/fastText"}
cython = "^0.29.32"
pydot = "^1.4.2"
matplotlib = "^3.6.1"

[tool.poetry.dev-dependencies]
pytest = "^5.2"
jupyter = "^1.0.0"
black = {extras = ["jupyter"], version = "^22.10.0"}

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.(ipynb|pyi?)$'

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
